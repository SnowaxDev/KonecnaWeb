services:
  - type: web
    name: seknuto-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    # --forwarded-allow-ips="*" lets uvicorn trust Render's proxy X-Forwarded-*
    # headers so request.base_url resolves to the correct public https URL used
    # when building gallery image URLs.
    startCommand: 'uvicorn server:app --host 0.0.0.0 --port $PORT --forwarded-allow-ips="*"'
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: MONGO_URL
        sync: false
      # Optional: absolute public URL of this backend (e.g.
      # https://konecnaweb.onrender.com). If set, used to build gallery image
      # URLs instead of relying on proxy headers.
      - key: PUBLIC_BACKEND_URL
        sync: false
      - key: DB_NAME
        value: seknuto_production
      - key: CORS_ORIGINS
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SENDER_EMAIL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: RESEND_AUDIENCE_ID
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: STRIPE_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
